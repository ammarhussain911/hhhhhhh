
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavebox - Music Streaming</title>
<link rel="stylesheet" href="style.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
  body { background:#121212; color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .main { display:flex; flex:1; overflow:hidden; }

  .sidebar { width:220px; flex-shrink:0; background:#000; padding:1.5rem 1rem; display:flex; flex-direction:column; gap:6px; overflow-y:auto; }
  .logo { font-size:22px; font-weight:700; margin-bottom:1.5rem; color:#1db954; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:10px; border-radius:6px; cursor:pointer; color:#b3b3b3; font-size:14px; }
  .nav-item:hover, .nav-item.active { background:#1a1a1a; color:#fff; }
  .playlist-title { margin-top:1.5rem; font-size:12px; color:#888; text-transform:uppercase; letter-spacing:1px; }
  .playlist-item { padding:8px 10px; font-size:14px; color:#b3b3b3; cursor:pointer; border-radius:6px; }
  .playlist-item:hover { background:#1a1a1a; color:#fff; }

  .content { flex:1; overflow-y:auto; padding:2rem; background:linear-gradient(#1f1f1f, #121212); min-width:0; }
  .content h1 { font-size:28px; margin-bottom:1.5rem; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px; margin-bottom:2rem; }
  .card { background:#181818; border-radius:10px; padding:1rem; cursor:pointer; transition:.2s; position:relative; }
  .card:hover { background:#282828; }
  .card:hover .play-overlay { opacity:1; transform:translateY(0); }
  .card .art { width:100%; aspect-ratio:1; border-radius:8px; margin-bottom:10px; background-size:cover; background-position:center; position:relative; }
  .play-overlay {
    position:absolute; bottom:8px; right:8px; width:36px; height:36px; border-radius:50%;
    background:#1db954; color:#000; display:flex; align-items:center; justify-content:center;
    font-size:14px; opacity:0; transform:translateY(6px); transition:.2s; box-shadow:0 8px 16px rgba(0,0,0,.4);
  }
  .card p.title { font-size:14px; font-weight:600; margin-bottom:4px; }
  .card p.sub { font-size:12px; color:#a7a7a7; }

  .track-list { display:flex; flex-direction:column; }
  .track-row { display:flex; align-items:center; gap:14px; padding:10px 12px; border-radius:6px; cursor:pointer; }
  .track-row:hover { background:#1f1f1f; }
  .track-row.playing { background:#1f1f1f; color:#1db954; }
  .track-art { width:42px; height:42px; border-radius:4px; background-size:cover; background-position:center; flex-shrink:0; }
  .track-info { flex:1; min-width:0; }
  .track-info .t-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-info .t-artist { font-size:12px; color:#a7a7a7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-duration { font-size:13px; color:#a7a7a7; flex-shrink:0; }

  .player { height:90px; flex-shrink:0; background:#181818; border-top:1px solid #282828; display:flex; align-items:center; justify-content:space-between; padding:0 1rem; gap:10px; }
  .player-left { display:flex; align-items:center; gap:12px; width:30%; min-width:180px; }
  .player-art { width:56px; height:56px; border-radius:4px; background-size:cover; background-position:center; flex-shrink:0; }
  .player-track-title { font-size:14px; font-weight:500; }
  .player-track-artist { font-size:12px; color:#a7a7a7; }
  .like-btn { font-size:18px; cursor:pointer; color:#a7a7a7; margin-left:10px; }
  .like-btn.liked { color:#1db954; }

  .player-center { flex:1; max-width:600px; display:flex; flex-direction:column; align-items:center; gap:8px; min-width:0; }
  .controls { display:flex; align-items:center; gap:20px; }
  .controls i,.controls span.icon { font-size:18px; cursor:pointer; color:#b3b3b3; }
  .controls span.icon:hover { color:#fff; }
  .play-pause { font-size:32px !important; color:#fff !important; }
  .progress-row { display:flex; align-items:center; gap:10px; width:100%; }
  .progress-row span { font-size:11px; color:#a7a7a7; }
  .progress-bar { flex:1; height:4px; background:#4d4d4d; border-radius:2px; cursor:pointer; position:relative; }
  .progress-fill { height:100%; background:#1db954; border-radius:2px; width:30%; }

  .player-right { display:flex; align-items:center; gap:12px; width:30%; justify-content:flex-end; min-width:140px; }
  .volume-bar { width:100px; height:4px; background:#4d4d4d; border-radius:2px; cursor:pointer; position:relative; }
  .volume-fill { height:100%; background:#fff; border-radius:2px; width:70%; }

  .search-bar { width:100%; padding:10px 14px; border-radius:20px; border:none; background:#2a2a2a; color:#fff; margin-bottom:1.5rem; font-size:14px; outline:none; }
  .search-bar::placeholder { color:#888; }

  .menu-toggle { display:none; }

  ::-webkit-scrollbar { width:8px; }
  ::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }

  /* ===== RESPONSIVE BREAKPOINTS ===== */

  /* Tablet */
  @media (max-width: 900px) {
    .sidebar { width:180px; padding:1.2rem .75rem; }
    .content { padding:1.5rem; }
    .player-left { width:auto; min-width:140px; }
    .player-right { display:none; }
    .player-center { max-width:none; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    body { overflow:auto; height:auto; min-height:100vh; }
    .main { flex-direction:column; overflow:visible; }

    .sidebar {
      width:100%; flex-direction:row; flex-wrap:wrap; align-items:center;
      padding:.75rem 1rem; gap:4px; position:sticky; top:0; z-index:20;
      border-bottom:1px solid #1f1f1f;
    }
    .logo { margin-bottom:0; margin-right:auto; }
    .nav-item { padding:6px 10px; font-size:13px; }
    .playlist-title { display:none; }
    .playlist-item { display:none; }

    .content { padding:1rem; overflow-y:visible; }
    .content h1 { font-size:22px; margin-bottom:1rem; }
    .cards { grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:12px; margin-bottom:1.5rem; }

    .player {
      flex-wrap:wrap; height:auto; padding:.75rem; gap:8px;
      position:sticky; bottom:0;
    }
    .player-left { width:100%; order:1; }
    .player-center { width:100%; order:2; max-width:none; }
    .player-right { display:none; }
    .controls { gap:24px; }
  }

  @media (max-width: 380px) {
    .cards { grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); }
    .player-art, .track-art { width:38px; height:38px; }
  }
</style>
</head>
<body>

<div class="main">
  <div class="sidebar">
    <div class="logo">🎵 Wavebox</div>
    <div class="nav-item active" data-view="home">🏠 Home</div>
    <div class="nav-item" data-view="search">🔍 Search</div>
    <div class="nav-item" data-view="liked">❤️ Liked Songs</div>

    <div class="playlist-title">Playlists</div>
    <div class="playlist-item" data-yt-query="Chill Mix playlist songs">Chill Mix</div>
    <div class="playlist-item" data-yt-query="Focus Flow playlist songs">Focus Flow</div>
    <div class="playlist-item" data-yt-query="Road Trip playlist songs">Road Trip</div>
    <div class="playlist-item" data-yt-query="Throwback Hits playlist songs">Throwback Hits</div>
  </div>

  <div class="content">
    <input type="text" class="search-bar" id="searchInput" placeholder="Search for songs, artists...">
    <h1 id="contentTitle">Good evening</h1>

    <div class="cards" id="cardGrid"></div>

    <h1 style="font-size:20px; margin-bottom:1rem;">Recently played</h1>
    <div class="track-list" id="trackList"></div>
  </div>
</div>

<div class="player">
  <div class="player-left">
    <div class="player-art" id="playerArt"></div>
    <div>
      <div class="player-track-title" id="playerTitle">Select a track</div>
      <div class="player-track-artist" id="playerArtist">—</div>
    </div>
    <span class="like-btn" id="likeBtn">♡</span>
  </div>

  <div class="player-center">
    <div class="controls">
      <span class="icon">🔀</span>
      <span class="icon" id="prevBtn">⏮</span>
      <span class="icon play-pause" id="playBtn">▶️</span>
      <span class="icon" id="nextBtn">⏭</span>
      <span class="icon">🔁</span>
    </div>
    <div class="progress-row">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="totalTime">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <span class="icon">🔊</span>
    <div class="volume-bar" id="volumeBar">
      <div class="volume-fill" id="volumeFill"></div>
    </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
const tracks = [
  { title: "Midnight Drive", artist: "Nova Sound", album: "Neon Nights", duration: "3:42", cover: "https://picsum.photos/seed/track1/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
  { title: "Golden Hour", artist: "Lia Park", album: "Sunset Sessions", duration: "4:01", cover: "https://picsum.photos/seed/track2/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
  { title: "Static Bloom", artist: "Echo Ridge", album: "Frequencies", duration: "2:58", cover: "https://picsum.photos/seed/track3/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
  { title: "Paper Planes", artist: "Nova Sound", album: "Neon Nights", duration: "3:15", cover: "https://picsum.photos/seed/track4/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
  { title: "Slow Burn", artist: "Quiet Atlas", album: "Embers", duration: "3:50", cover: "https://picsum.photos/seed/track5/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
  { title: "City Lights", artist: "Lia Park", album: "Sunset Sessions", duration: "3:33", cover: "https://picsum.photos/seed/track6/300/300", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" }
];

// Each playlist card carries a YouTube search query rather than a hardcoded
// video link, since clicking should take the user to relevant results on YouTube.
const playlists = [
  { name: "Daily Mix 1", sub: "Made for you", art: "https://picsum.photos/seed/playlist1/300/300", ytQuery: "daily mix playlist songs" },
  { name: "Liked Songs", sub: "Your favorites", art: "https://picsum.photos/seed/playlist2/300/300", ytQuery: "liked songs playlist" },
  { name: "Chill Mix", sub: "Relax & unwind", art: "https://picsum.photos/seed/playlist3/300/300", ytQuery: "chill mix songs playlist" },
  { name: "Focus Flow", sub: "Deep concentration", art: "https://picsum.photos/seed/playlist4/300/300", ytQuery: "focus flow study music playlist" },
  { name: "Road Trip", sub: "Drive playlist", art: "https://picsum.photos/seed/playlist5/300/300", ytQuery: "road trip music playlist" },
];

function youtubeSearchUrl(query) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
}

let currentIndex = -1;
let isPlaying = false;
let likedTracks = new Set();

const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const playerArt = document.getElementById('playerArt');
const playerTitle = document.getElementById('playerTitle');
const playerArtist = document.getElementById('playerArtist');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const likeBtn = document.getElementById('likeBtn');
const volumeBar = document.getElementById('volumeBar');
const volumeFill = document.getElementById('volumeFill');

const cardGrid = document.getElementById('cardGrid');
playlists.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="art" style="background-image:url('${p.art}')">
      <div class="play-overlay">▶</div>
    </div>
    <p class="title">${p.name}</p>
    <p class="sub">${p.sub}</p>
  `;
  card.addEventListener('click', () => {
    window.open(youtubeSearchUrl(p.ytQuery), '_blank', 'noopener');
  });
  cardGrid.appendChild(card);
});

// Sidebar playlist shortcuts also open YouTube search results
document.querySelectorAll('.playlist-item[data-yt-query]').forEach(item => {
  item.addEventListener('click', () => {
    window.open(youtubeSearchUrl(item.dataset.ytQuery), '_blank', 'noopener');
  });
});

const trackList = document.getElementById('trackList');

function renderTracks(list) {
  trackList.innerHTML = '';
  list.forEach((track, i) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    if (i === currentIndex) row.classList.add('playing');
    row.innerHTML = `
      <div class="track-art" style="background-image:url('${track.cover}')"></div>
      <div class="track-info">
        <div class="t-title">${track.title}</div>
        <div class="t-artist">${track.artist}</div>
      </div>
      <div class="track-duration">${track.duration}</div>
    `;
    row.addEventListener('click', () => playTrack(i));
    trackList.appendChild(row);
  });
}
renderTracks(tracks);

function playTrack(index) {
  currentIndex = index;
  const track = tracks[index];

  audio.src = track.audioUrl;
  audio.play().catch(() => {});

  playerArt.style.backgroundImage = `url('${track.cover}')`;
  playerTitle.textContent = track.title;
  playerArtist.textContent = track.artist;

  isPlaying = true;
  playBtn.textContent = '⏸️';

  likeBtn.classList.toggle('liked', likedTracks.has(index));
  likeBtn.textContent = likedTracks.has(index) ? '♥' : '♡';

  renderTracks(tracks);
}

function togglePlay() {
  if (currentIndex === -1) {
    playTrack(0);
    return;
  }
  if (isPlaying) {
    audio.pause();
    playBtn.textContent = '▶️';
  } else {
    audio.play();
    playBtn.textContent = '⏸️';
  }
  isPlaying = !isPlaying;
}

function nextTrack() {
  if (currentIndex === -1) return playTrack(0);
  playTrack((currentIndex + 1) % tracks.length);
}

function prevTrack() {
  if (currentIndex === -1) return playTrack(0);
  playTrack((currentIndex - 1 + tracks.length) % tracks.length);
}

playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', nextTrack);
document.getElementById('prevBtn').addEventListener('click', prevTrack);

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  currentTimeEl.textContent = formatTime(audio.currentTime);
  totalTimeEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
  nextTrack();
});

progressBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

function formatTime(sec) {
  if (isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

audio.volume = 0.7;
volumeBar.addEventListener('click', (e) => {
  const rect = volumeBar.getBoundingClientRect();
  const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  audio.volume = pct;
  volumeFill.style.width = (pct * 100) + '%';
});

likeBtn.addEventListener('click', () => {
  if (currentIndex === -1) return;
  if (likedTracks.has(currentIndex)) {
    likedTracks.delete(currentIndex);
    likeBtn.classList.remove('liked');
    likeBtn.textContent = '♡';
  } else {
    likedTracks.add(currentIndex);
    likeBtn.classList.add('liked');
    likeBtn.textContent = '♥';
  }
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = tracks.filter(t =>
    t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q)
  );
  renderTracks(filtered);
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    const view = item.dataset.view;
    if (view === 'home') {
      document.getElementById('contentTitle').textContent = 'Good evening';
      cardGrid.style.display = 'grid';
      renderTracks(tracks);
    } else if (view === 'search') {
      document.getElementById('contentTitle').textContent = 'Search';
      cardGrid.style.display = 'none';
      renderTracks(tracks);
    } else if (view === 'liked') {
      document.getElementById('contentTitle').textContent = 'Liked Songs';
      cardGrid.style.display = 'none';
      renderTracks(tracks.filter((_, i) => likedTracks.has(i)));
    }
  });
});
</script>

</body>
</html>s
